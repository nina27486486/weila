name: 功能建议
description: 提议一个有明确使用场景和验收方式的改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请先查看 ROADMAP。大型功能会先讨论边界，不保证立即进入开发。

  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 你在什么情况下遇到了什么问题
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述操作流程和用户可见结果，而不只是技术实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: 怎样判断这个功能已经完成并且可用
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 该建议不要求托管、分发未授权内容或绕过访问控制
          required: true
        - label: 我已查看 ROADMAP 和现有 Issue
          required: true
