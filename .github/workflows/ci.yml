name: Windows CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze, test and build
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test --no-pub

      - name: Build Windows release
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tool/build_windows_release.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: weila-windows-x64
          path: build/windows/x64/runner/weila-*-windows-x64.zip
          if-no-files-found: error
